spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  datasource:
    url: jdbc:postgresql://localhost:5432/ewm-database
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

stats:
  client:
    serviceId: stats-server